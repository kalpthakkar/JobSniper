# ============================================================
# JOB SNIPER — Master Configuration
# ============================================================

system:
  # Max parallel polling threads
  max_workers: 20

  # NOTE: Polling intervals are now managed by PriorityScheduler with adaptive weighting
  # HIGH:MID:LOW = 12:3:1 slots per cycle. No fixed intervals — frequencies emerge naturally.

  # IP rotation strategy: none | rotating_proxies | tor | user_agent_rotation
  ip_strategy: user_agent_rotation

  # Path to proxy list file (one proxy per line: http://user:pass@host:port)
  proxy_file: proxies.txt   # optional; leave blank to disable

  # Database file path (local SQLite store)
  db_path: data/job_db.db

  # Log level: DEBUG | INFO | WARNING | ERROR
  log_level: INFO

  # Request timeout in seconds (increased from 10 to handle slow APIs)
  request_timeout: 30

  # Max retries per request before marking company as temporarily unavailable
  max_retries: 3

  # Delay between retries (seconds)
  retry_delay: 0.5       # urllib3 backoff_factor for 5xx retries. Keep small — large values
                         # cause thread-blocking: delay = backoff_factor * 2^attempt.
                         # With 0.5: retries wait 0.5s, 1s, 2s = 3.5s max.
                         # Old value of 2 caused 2s+4s+8s = 14s blocking per failed request.

  # Google Careers polling
  google_enabled: true
  google_cooldown_minutes: 3
  google_request_timeout: 30

  # Tesla Careers polling
  tesla_enabled: true
  tesla_cooldown_minutes: 3
  tesla_request_timeout: 60

  # Apple Careers polling
  apple_enabled: true
  apple_cooldown_minutes: 3
  apple_request_timeout: 20

  # Microsoft Careers polling
  microsoft_enabled: true
  microsoft_cooldown_minutes: 3
  microsoft_request_timeout: 20

  # Disable 24-hour job filter per ATS type
  # Set to true to track ALL jobs regardless of publish date (useful for initial baseline)
  # Set to false (default) to only track jobs published in last 24h (reduces database bloat)
  disable_24h_filter:
    greenhouse: false
    lever: false
    ashby: false
    workable: false
    workday: false

  # Frequency inspection: Monitor how often a specific board token is polled
  # Useful for understanding dispatch frequency and slot allocation
  frequency_inspection_enabled: true
  frequency_inspect_board_token: "easthampton"  # e.g., "openai" to track OpenAI's endpoint

  # Notification channels: now managed via the /notify dashboard UI
  # These values are stored persistently in the database and can be toggled in real-time
  # Legacy support: this list is used as defaults on first startup
  notify_channels:
    - console
    - telegram

  # Telegram bot config (only used if 'telegram' in notify_channels)
  telegram:
    bot_token: "8405081173:AAE0YSeRr0ef9476ZLuMAX4eGkxZ1w-Cb04"
    chat_id: "6663005447"

  # Webhook config (only used if 'webhook' in notify_channels)
  webhook:
    url: "https://your-webhook-url.com/notify"
    headers:
      Content-Type: "application/json"

# ============================================================
# ATS Endpoint Schemas
# Each ATS type defines how to build the fetch URL + params
# ============================================================
ats_schemas:
  greenhouse:
    base_url: "https://boards-api.greenhouse.io/v1/boards/{board_token}/jobs"
    params:
      content: "true"
    method: GET
    timeout: 30

  ashby:
    base_url: "https://api.ashbyhq.com/posting-api/job-board/{board_token}"
    params:
      includeCompensation: "true"
    method: GET
    timeout: 45  # GraphQL can be slow; increased from default

  workable:
    base_url: "https://apply.workable.com/api/v1/widget/accounts/{board_token}"
    params: {}
    method: GET
    timeout: 40  # REST API with generous timeout

  workday:
    base_url: "{board_token}"
    params: {}
    method: GET
    timeout: 45  # Increased from 30 for slow Workday instances

  lever:
    base_url: "https://api.lever.co/v0/postings/{board_token}"
    params:
      mode: "json"
      limit: "50"
    method: GET
    timeout: 60  # Lever is slow; increased from 30 to handle latency
